  tables:
    MISSING:
      row_attr_map:
        modelNum: PDB_model_num
        resName: label_comp_id
        chainID: label_asym_id
        seqNum: label_seq_id
        auth_chainID: auth_asym_id
        auth_resName: auth_comp_id
        auth_seqNum: auth_seq_id
        iCode: PDB_ins_code
      blank_if_single_valued:
        - modelNum
# --- header / metadata records ---------------------------------------------
# Single-row descriptive categories. Attribute names mirror the corresponding
# PDB record fields so downstream consumers are format-agnostic. Text fields
# (title, keywds) are uppercased to match the PDB convention; note that
# depDate is exposed in mmCIF's native ISO form (YYYY-MM-DD), unlike the PDB
# DD-MON-YY representation.
HEADER:
  data_obj: entry
  attr_map:
    idCode: id
  merge:
    struct_keywords:
      classification: pdbx_keywords
    pdbx_database_status:
      depDate: recvd_initial_deposition_date
TITLE:
  data_obj: struct
  attr_map:
    title: title
  allcaps:
    - title
EXPDTA:
  data_obj: exptl
  attr_map:
    technique: method
KEYWDS:
  data_obj: struct_keywords
  attr_map:
    keywds: text
  splits:
    - keywds
  allcaps:
    - keywds
CRYST1:
  data_obj: cell
  attr_map:
    a: length_a
    b: length_b
    c: length_c
    alpha: angle_alpha
    beta: angle_beta
    gamma: angle_gamma
    z: Z_PDB
  merge:
    symmetry:
      sGroup: space_group_name_H-M
# SEQRES: one record per author chain, residues collected in sequence order.
# pdbx_poly_seq_scheme rows carry pdb_strand_id (author chain) and mon_id.
SEQRES:
  data_obj: pdbx_poly_seq_scheme
  groupby: pdb_strand_id
  group_attr_map:
    chainID: pdb_strand_id
  collect:
    resNames: mon_id
  lengths:
    numRes: resNames
# --- secondary structure ---------------------------------------------------
# HELIX from struct_conf (protein helices only). Residue endpoints use author
# numbering to match the PDB HELIX record.
HELIX:
  data_obj: struct_conf
  signal_attr: conf_type_id
  signal_value: HELX_P
  attr_map:
    helixID: pdbx_PDB_helix_id
    initRes:
      chainID: beg_auth_asym_id
      resName: beg_auth_comp_id
      seqNum: beg_auth_seq_id
      iCode: pdbx_beg_PDB_ins_code
    endRes:
      chainID: end_auth_asym_id
      resName: end_auth_comp_id
      seqNum: end_auth_seq_id
      iCode: pdbx_end_PDB_ins_code
    helixClass: pdbx_PDB_helix_class
    length: pdbx_PDB_helix_length
    comment: details
# SHEET from struct_sheet_range (strand ranges only). NOTE: sense, numStrands,
# and the H-bond registration (curAtom/curRes/prevAtom/prevRes) come from
# struct_sheet_order and pdbx_struct_sheet_hbond, which require multi-key joins
# not yet supported; those fields are omitted here.
SHEET:
  data_obj: struct_sheet_range
  attr_map:
    strand: id
    sheetID: sheet_id
    initRes:
      chainID: beg_auth_asym_id
      resName: beg_auth_comp_id
      seqNum: beg_auth_seq_id
      iCode: pdbx_beg_PDB_ins_code
    endRes:
      chainID: end_auth_asym_id
      resName: end_auth_comp_id
      seqNum: end_auth_seq_id
      iCode: pdbx_end_PDB_ins_code
# --- entity / source (native mmCIF-shaped records) -------------------------
# These do NOT mirror the PDB COMPND/SOURCE tokengroup structure; they expose
# per-entity information as flat records. COMPND covers polymer entities only
# (driven by entity_poly), joining the molecule name from `entity`.
COMPND:
  data_obj: entity_poly
  attr_map:
    molID: entity_id
    chains: pdbx_strand_id
  splits:
    - chains
  as_list:
    - chains
  join:
    entity:
      self_key: molID
      other_key: id
      attr_map:
        molName: pdbx_description
  allcaps:
    - molName
SOURCE:
  data_obj: entity_src_gen
  attr_map:
    molID: entity_id
    organism: pdbx_gene_src_scientific_name
    taxid: pdbx_gene_src_ncbi_taxonomy_id
    exprSystem: pdbx_host_org_scientific_name
    exprTaxid: pdbx_host_org_ncbi_taxonomy_id
    gene: pdbx_gene_src_gene
  allcaps:
    - organism
    - exprSystem
    - gene

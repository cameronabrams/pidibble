# just a minimal specification to translate links, disulfides, atoms, missing residues, and biomolecular assembly instructions
ATOM:
  data_obj: atom_site
  signal_attr: group_PDB
  signal_value: ATOM
  global_maps:
    chainmap:
      key: label_asym_id
      value: auth_asym_id
  global_ids:
    modelNum: pdbx_PDB_model_num
  if_dot_replace_with:
    label_seq_id: auth_seq_id
  attr_map:
    serial: id
    name: label_atom_id
    altLoc: label_alt_id
    residue:
      chainID: label_asym_id
      resName: label_comp_id
      seqNum: label_seq_id
    residue_auth:
      chainID: auth_asym_id
      resName: auth_comp_id
      seqNum: auth_seq_id
      iCode: pdbx_PDB_ins_code
    x: Cartn_x
    y: Cartn_y
    z: Cartn_z
    occupancy: occupancy
    tempFactor: B_iso_or_equiv
    element: type_symbol
    charge: pdbx_formal_charge
    auth_atom_id: auth_atom_id
HETATM:
  data_obj: atom_site
  signal_attr: group_PDB
  signal_value: HETATM
  global_maps:
    chainmap:
      key: label_asym_id
      value: auth_asym_id 
  global_ids:
    modelNum: pdbx_PDB_model_num
  attr_map:
    serial: id
    name: label_atom_id
    altLoc: label_alt_id
    residue:
      chainID: label_asym_id
      resName: label_comp_id
      seqNum: label_seq_id
    residue_auth:
      chainID: auth_asym_id
      resName: auth_comp_id
      seqNum: auth_seq_id
      iCode: pdbx_PDB_ins_code
    x: Cartn_x
    y: Cartn_y
    z: Cartn_z
    occupancy: occupancy
    tempFactor: B_iso_or_equiv
    element: type_symbol
    charge: pdbx_formal_charge
    auth_atom_id: auth_atom_id

REMARK.350:
  data_obj: pdbx_struct_assembly_gen
  attr_map:
    BIOMOLECULE: assembly_id
    header: asym_id_list
    divnumber: oper_expression
  splits:
    - header
  spawns_on: divnumber
  indexes: BIOMOLECULE
  map_values:
    header: chainmap
  spawn_data:
    data_obj: pdbx_struct_oper_list
    indexes: TRANSFORM
    attr_map:
      spawn_idx: id
      TRANSFORM: id
      row1: 
        m1: matrix[1][1]
        m2: matrix[1][2]
        m3: matrix[1][3]
        t: vector[1]
      row2: 
        m1: matrix[2][1]
        m2: matrix[2][2]
        m3: matrix[2][3]
        t: vector[2]
      row3: 
        m1: matrix[3][1]
        m2: matrix[3][2]
        m3: matrix[3][3]
        t: vector[3]
    list_attr:
      row:
        - row1
        - row2
        - row3
      coordinate:
        - 1
        - 2
        - 3

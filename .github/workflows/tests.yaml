name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  pytest:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with test extras
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]
      - name: Run unit tests
        run: pytest tests/unit -q

  doctest:
    name: doctest (docs examples)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install docs requirements and local package
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt
          pip install -e .        # test the working tree, not the PyPI build
      - name: Run documentation doctests
        run: python -m sphinx -b doctest docs/source docs/_build/doctest
